services:
  - type: web
    name: task-management-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gevent -w 1 app:app
    envVars:
      - key: USE_POSTGRES
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: task-management-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: task-management-db
    databaseName: task_db
    user: task_user
