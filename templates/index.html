<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Task Management System</div>
        <div class="nav-user">
            <span>Welcome, {{ current_user.username }}</span>
            <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
        </div>
    </nav>

    <main class="dashboard">
        <section class="analytics-section">
            <h2>Analytics Overview</h2>
            <div class="stats-grid" id="stats-container">
                <div class="stat-card">
                    <h3>Total Tasks</h3>
                    <p id="total-tasks">0</p>
                </div>
                <div class="stat-card">
                    <h3>Completed</h3>
                    <p id="completed-tasks">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pending</h3>
                    <p id="pending-tasks">0</p>
                </div>
                <div class="stat-card highlight">
                    <h3>Completion</h3>
                    <p id="completion-pct">0%</p>
                </div>
            </div>
        </section>

        <section class="task-section">
            <div class="section-header">
                <h2>My Tasks</h2>
                <button class="btn-add" onclick="toggleModal(true)">+ New Task</button>
            </div>
            
            <div class="task-list" id="task-list">
                <!-- Tasks will be loaded here via JS -->
            </div>
        </section>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- Add Task Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleModal(false)">&times;</span>
            <h2>Create New Task</h2>
            <form id="task-form">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="task-title" required placeholder="What needs to be done?">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="task-desc" rows="3" placeholder="Add more details..."></textarea>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="task-priority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Save Task</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
